{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        font-family: 'Poppins', sans-serif;
    }

    /* 🔥 CONTAINER */
    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 15px;
    }

    /* 💎 CARD */
    .login-card {
        width: 100%;
        max-width: 420px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        transition: 0.3s;
    }

    .login-card:hover {
        transform: translateY(-5px);
    }

    .login-card h2 {
        font-weight: 600;
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    /* 🧾 INPUT */
    .form-control {
        border-radius: 12px;
        padding: 12px;
        font-size: 14px;
    }

    .form-control:focus {
        box-shadow: 0 0 8px rgba(102,126,234,0.4);
        border-color: #667eea;
    }

    /* 🚀 BUTTON */
    .btn-custom {
        width: 100%;
        border-radius: 12px;
        font-weight: 600;
        padding: 12px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        transition: 0.3s;
    }

    .btn-custom:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    /* 🔗 LINKS */
    .links {
        text-align: center;
        margin-top: 18px;
        font-size: 14px;
    }

    .links a {
        text-decoration: none;
        font-weight: 500;
        color: #5a67d8;
    }

    .links a:hover {
        text-decoration: underline;
    }

    /* 📱 MOBILE OPTIMIZATION */
    @media (max-width: 576px) {
        .login-card {
            padding: 20px;
            border-radius: 15px;
        }

        .login-card h2 {
            font-size: 20px;
        }

        .form-control {
            padding: 10px;
            font-size: 13px;
        }

        .btn-custom {
            padding: 10px;
            font-size: 14px;
        }
    }

    /* 📲 TABLET */
    @media (min-width: 577px) and (max-width: 768px) {
        .login-card {
            max-width: 450px;
        }
    }
</style>

<div class="login-container">
    <div class="login-card">

        <h2>🔐 Employee Login</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button class="btn btn-custom mt-2">Login</button>
        </form>

        <div class="links">
            <p class="mt-3">
                Don't have an account?  
                <a href="{% url 'register' %}">Register</a>
            </p>

            <p>
                Admin Login?  
                <a href="{% url 'admin_login' %}">Click here</a>
            </p>
        </div>

    </div>
</div>

{% endblock %}
