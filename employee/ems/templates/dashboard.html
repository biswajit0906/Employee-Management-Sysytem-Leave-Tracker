{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #eef2f3, #dfe9f3);
        font-family: 'Poppins', sans-serif;
    }

    .dashboard-container {
        margin-top: 40px;
    }

    /* 🔝 HEADER */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .header h2 {
        font-weight: 600;
        color: #2d3748;
    }

    .btn-apply {
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
        border-radius: 25px;
        padding: 10px 20px;
        font-weight: 500;
        border: none;
        transition: 0.3s;
    }

    .btn-apply:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    /* 📦 CARD */
    .card-custom {
        border-radius: 20px;
        padding: 25px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* 🧾 TABLE */
    table {
        margin-top: 15px;
        border-radius: 12px;
        overflow: hidden;
    }

    thead {
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
    }

    tbody tr {
        transition: 0.2s;
    }

    tbody tr:hover {
        background: #f1f5ff;
        transform: scale(1.01);
    }

    th, td {
        vertical-align: middle !important;
    }

    /* 🎯 STATUS BADGES */
    .status {
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.3px;
    }

    .pending {
        background: #fff3cd;
        color: #856404;
    }

    .approved {
        background: #d4edda;
        color: #155724;
    }

    .rejected {
        background: #f8d7da;
        color: #721c24;
    }

    /* ✨ EMPTY STATE */
    .empty-text {
        padding: 20px;
        color: #777;
        font-style: italic;
    }

</style>

<div class="container dashboard-container">

    <!-- 🔝 HEADER -->
    <div class="header mb-4">
        <h2>📋 Your Leave Dashboard</h2>
        <a href="{% url 'apply_leave' %}" class="btn btn-apply">+ Apply Leave</a>
    </div>

    <!-- 📦 CARD -->
    <div class="card-custom">

        <table class="table table-hover text-center align-middle">
            <thead>
                <tr>
                    <th>Reason</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                {% for leave in leaves %}
                <tr>
                    <td>{{ leave.reason }}</td>
                    <td>{{ leave.from_date }}</td>
                    <td>{{ leave.to_date }}</td>
                    <td>
                        <span class="status
                            {% if leave.status == 'Approved' %}approved
                            {% elif leave.status == 'Rejected' %}rejected
                            {% else %}pending{% endif %}">
                            {{ leave.status }}
                        </span>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="empty-text">
                        No leave records found 😴
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

{% endblock %}
