{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <h3>Update Employee</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" value="{{ emp.name }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" value="{{ emp.email }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Department</label>
            <input type="text" name="department" value="{{ emp.department }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Contact</label>
            <input type="text" name="contact" value="{{ emp.contact }}" class="form-control">
        </div>

        <button type="submit" class="btn btn-success">Update</button>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
