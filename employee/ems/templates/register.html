{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
    }

    .register-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 40px;
    }

    .register-card {
        width: 100%;
        max-width: 500px;
        padding: 35px;
        border-radius: 15px;
        background: #fff;
        box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .register-title {
        text-align: center;
        font-weight: bold;
        margin-bottom: 20px;
        color: #333;
    }

    .form-control {
        border-radius: 10px;
        padding: 10px;
    }

    .btn-register {
        width: 100%;
        border-radius: 10px;
        padding: 10px;
        font-weight: 600;
        background: #28a745;
        color: white;
        transition: 0.3s;
    }

    .btn-register:hover {
        background: #218838;
    }

    .icon {
        text-align: center;
        font-size: 40px;
        margin-bottom: 10px;
    }

    .footer-text {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .footer-text a {
        text-decoration: none;
    }

    .footer-text a:hover {
        text-decoration: underline;
    }
</style>

<div class="container register-wrapper">

    <div class="register-card">

        <div class="icon">📝</div>
        <h3 class="register-title">Employee Registration</h3>

        <form method="POST">
            {% csrf_token %}

            <!-- If using Django Form -->
            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label>Department</label>
                <input type="text" name="department" class="form-control" placeholder="Enter department" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="mb-3">
                <label>Contact Number</label>
                <input type="text" name="contact" class="form-control" placeholder="Enter contact number" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <button class="btn btn-register">Register</button>
        </form>

        <div class="footer-text">
            <p>Already have an account? 
                <a href="{% url 'login' %}">Login here</a>
            </p>
        </div>

    </div>

</div>

{% endblock %}
