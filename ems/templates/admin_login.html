{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        height: 100vh;
    }

    .login-wrapper {
        height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-card {
        width: 100%;
        max-width: 420px;
        padding: 35px;
        border-radius: 15px;
        background: #ffffff;
        box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .login-title {
        text-align: center;
        font-weight: bold;
        margin-bottom: 25px;
        color: #333;
    }

    .form-control {
        border-radius: 10px;
        padding: 10px;
    }

    .btn-login {
        width: 100%;
        border-radius: 10px;
        padding: 10px;
        font-weight: 600;
        background: #1e3c72;
        color: white;
        transition: 0.3s;
    }

    .btn-login:hover {
        background: #16325c;
    }

    .icon {
        text-align: center;
        font-size: 40px;
        margin-bottom: 10px;
    }

    .footer-text {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .footer-text a {
        text-decoration: none;
    }

    .footer-text a:hover {
        text-decoration: underline;
    }
</style>

<div class="container login-wrapper">

    <div class="login-card">

        <div class="icon">🔐</div>
        <h3 class="login-title">Admin Login</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter admin username" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <button class="btn btn-login">Login</button>
        </form>

        <div class="footer-text">
            <p>← <a href="{% url 'login' %}">Back to Employee Login</a></p>
        </div>

    </div>

</div>

{% endblock %}
